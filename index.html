<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PazarlisApps — Coming Soon</title>
    <style>
        :root {
            --color-bg: #FAFAF9;
            --color-text: #1C1917;
            --color-text-secondary: #57534E;
            --color-accent: #0F766E;
            --color-border: #E7E5E4;
            --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-body: Georgia, 'Times New Roman', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 28px;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
        }

        .logo span { color: var(--color-accent); }

        h1 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            color: var(--color-text-secondary);
            line-height: 1.6;
            max-width: 400px;
        }

        a {
            color: var(--color-accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .links {
            margin-top: 48px;
            font-family: var(--font-display);
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .links a {
            color: var(--color-text-secondary);
            margin: 0 12px;
        }

        .links a:hover { color: var(--color-accent); }
    </style>
</head>
<body>
    <div class="logo">Pazarlis<span>Apps</span></div>
    <h1>Coming Soon</h1>
    <p>Business automation services for WhatsApp, Messenger & Instagram. We're building something great.</p>
    <p style="margin-top: 16px;"><a href="mailto:pazarlisapps.com@gmail.com">pazarlisapps.com@gmail.com</a></p>
    <div class="links">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/data-deletion.html">Data Deletion</a>
    </div>
</body>
</html>
